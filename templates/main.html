<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.0-beta1/dist/css/bootstrap.min.css"
          integrity="sha384-giJF6kkoqNQ00vy+HMDP7azOuL0xtbfIcaT9wjKHr8RbDVddVHyTfAAsrekwKmP1"
          crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css">
    <title>Title</title>
</head>
<body>
<div style="margin-bottom: 20px; position: sticky; top: 0; z-index: 1000; background-color: dodgerblue; padding: 10px;">
    <div class="container-fluid">
        <nav class="navbar navbar-expand-lg navbar-light">
            <button class="btn btn-primary navbar-toggler" type="button" data-bs-toggle="collapse"
                    data-bs-target="#navbarNav" style="text-decoration: none; color: white;">
                <i class="bi bi-list"></i>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <div class="d-flex flex-wrap justify-content-center gap-2 w-100">
                    <a class="btn btn-primary flex-grow-1" href="/">Главная</a>
                    <a class="btn btn-primary flex-grow-1" href="/words">Игра в слова</a>
                    <a class="btn btn-primary flex-grow-1" href="/cities">Игра в города</a>
                    <a class="btn btn-primary flex-grow-1" href="/elephant">Купи слона</a>
                </div>
            </div>
        </nav>
    </div>
    <h1 style="text-align: center; color: white;"> {% if title %} {{ title }} {% endif %} </h1>
</div>
{% block content %}
{% endblock %}
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script>
    document.addEventListener('DOMContentLoaded', function() {
      var popoverTriggerList = [].slice.call(document.querySelectorAll('[data-bs-toggle="popover"]'));
      var popoverList = popoverTriggerList.map(function (popoverTriggerEl) {
        return new bootstrap.Popover(popoverTriggerEl);
      });
    });
</script>
</body>
</html>
